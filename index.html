<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极客教程 - 专业 Linux 运维学习导航</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text-dark); line-height: 1.6; }

        /* 导航栏 */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -1px; }

        /* 英雄区 */
        .hero {
            padding: 5rem 5% 3rem;
            text-align: center;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .hero h1 { font-size: 2.8rem; margin-bottom: 1.5rem; letter-spacing: -1px; }
        .hero p { color: var(--text-light); font-size: 1.2rem; margin-bottom: 2.5rem; }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        #mainSearch {
            width: 100%;
            padding: 1.2rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
        }

        #mainSearch:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        /* 教程网格 */
        .main-content { max-width: 1200px; margin: 3rem auto; padding: 0 1.5rem; }
        
        .section-header { margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between; }
        .section-header h2 { font-size: 1.5rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* 教程卡片 */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: #eff6ff;
            color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-tag { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--primary); margin-bottom: 0.5rem; }
        .card h3 { font-size: 1.25rem; margin-bottom: 0.75rem; }
        .card p { font-size: 0.95rem; color: var(--text-light); flex-grow: 1; }

        /* 底部 */
        footer { text-align: center; padding: 5rem 0; color: var(--text-light); font-size: 0.9rem; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">GEEK_DOCS</a>
    </header>

    <section class="hero">
        <h1>探索 Linux 的深度与广度</h1>
        <p>结构化的教程，助你从小白晋升为资深运维工程师</p>
        <div class="search-container">
            <input type="text" id="mainSearch" placeholder="搜索教程：如 'ufw', '性能测试', '命令'...">
        </div>
    </section>

    <main class="main-content">
        <div class="section-header">
            <h2>全站教程指引</h2>
        </div>

        <div class="grid" id="tutorialGrid">
            <!-- 教程 1 -->
            <a href="ufw-tutorial.html" class="card" data-title="ufw 防火墙 安全设置">
                <div class="card-icon">🛡️</div>
                <div class="card-tag">安全防护</div>
                <h3>UFW 防火墙配置</h3>
                <p>Ubuntu/Debian 必备！简单易用的端口管理与安全策略指南。</p>
            </a>

            <!-- 教程 2 -->
            <a href="bench-sh-tutorial.html" class="card" data-title="bench.sh 性能测试 vps">
                <div class="card-icon">🚀</div>
                <div class="card-tag">性能工具</div>
                <h3>Bench.sh 测试脚本</h3>
                <p>一键查看 VPS 硬件信息、网络带宽及硬盘 I/O 性能。</p>
            </a>

            <!-- 教程 3 -->
            <a href="linux-upgrade-tutorial.html" class="card" data-title="upgrade update 升级 更新系统">
                <div class="card-icon">📦</div>
                <div class="card-tag">基础运维</div>
                <h3>系统升级命令</h3>
                <p>掌握 apt/yum 不同发行版的软件更新与内核升级技巧。</p>
            </a>

            <!-- 教程 4 -->
            <a href="linux-commands-all.html" class="card" data-title="linux命令大全 速查手册">
                <div class="card-icon">📚</div>
                <div class="card-tag">参考手册</div>
                <h3>Linux 命令大全集</h3>
                <p>包含文件操作、网络工具、系统管理在内的全能速查库。</p>
            </a>
        </div>
    </main>

    <footer>
        &copy; 2024 极客教程网 - 致力于传播优质的开源技术内容
    </footer>

    <script>
        // 首页实时搜索功能
        const searchInput = document.getElementById('mainSearch');
        const cards = document.querySelectorAll('.card');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            cards.forEach(card => {
                const title = card.getAttribute('data-title').toLowerCase();
                const text = card.innerText.toLowerCase();
                
                if (title.includes(query) || text.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
